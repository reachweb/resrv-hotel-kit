{{# Rich text (Bard) — narrow reading measure or wide. #}}
<section class="{{ if width == 'wide' }}section{{ else }}section-sm{{ /if }}">
    <div class="container-rsv">
        <div class="{{ if width == 'wide' }}max-w-3xl{{ else }}max-w-[680px]{{ /if }} reveal">
            {{ if overline }}<p class="text-xs font-semibold uppercase tracking-[0.12em] text-muted mb-3">{{ overline }}</p>{{ /if }}
            {{ if heading }}<h2 class="t-h2 mb-6 text-balance">{{ heading | widont }}</h2>{{ /if }}
            <div class="prose prose-lg max-w-none prose-headings:font-display prose-headings:font-medium prose-headings:text-ink prose-p:text-ink/85 prose-li:text-ink/85 prose-a:text-terracotta-dark prose-strong:text-ink">
                {{ content }}
            </div>
        </div>
    </div>
</section>
