{{#
    One FAQ accordion item. Expects a faq entry in scope (title = question,
    answer = Bard) and `index` (loop position), inside an x-data="{ open: null }".
    Reuses the .acc-item / .acc-panel / .acc-icon classes from site.css.
#}}
<div class="acc-item bg-white rounded-lg border border-line overflow-hidden" :class="{ open: open === {{ index }} }">
    <button type="button" class="w-full flex items-center justify-between gap-4 text-left p-5" @click="open = (open === {{ index }} ? null : {{ index }})">
        <span class="font-display font-medium text-[18px] pr-2">{{ title }}</span>
        <span class="acc-icon text-terracotta shrink-0">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        </span>
    </button>
    <div class="acc-panel">
        <div class="px-5 pb-5 prose max-w-none prose-p:text-muted prose-li:text-muted prose-a:text-terracotta-dark">{{ answer }}</div>
    </div>
</div>
