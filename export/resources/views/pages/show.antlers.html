{{# Page-builder renderer — one partial per Replicator set (partials/blocks/*);
    marketing pages are assembled from these stackable blocks. #}}
{{ if builder }}
    {{ builder }}
        {{ partial src="blocks/{type}" }}
    {{ /builder }}
{{ else }}
    <section class="section">
        <div class="container-rsv reading">
            <h1 class="t-display mb-6">{{ title }}</h1>
            {{ content }}
        </div>
    </section>
{{ /if }}
