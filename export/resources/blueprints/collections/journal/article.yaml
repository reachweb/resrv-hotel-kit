title: Article
tabs:
  main:
    display: Content
    sections:
      -
        fields:
          -
            handle: title
            field: { type: text, display: Title, localizable: true, validate: [required] }
          -
            handle: slug
            field: { type: slug, display: Slug, localizable: true, generate: true, validate: [required] }
          -
            handle: author
            field: { type: text, display: Author, default: 'Resrv Hotel', width: 50 }
          -
            handle: hero_image
            field:
              type: assets
              display: 'Hero image'
              container: assets
              folder: gallery
              max_files: 1
              mode: grid
              instructions: 'Recommended ratio 16:9.'
          -
            handle: excerpt
            field: { type: textarea, display: Excerpt, instructions: 'Short teaser for article cards.' }
          -
            handle: content
            field:
              type: bard
              display: Content
              localizable: true
              buttons: [h2, h3, bold, italic, unorderedlist, orderedlist, quote, image, anchor, removeformat]
              container: assets
  sidebar:
    display: Taxonomy
    sections:
      -
        fields:
          -
            handle: journal_categories
            field:
              type: terms
              display: Categories
              taxonomies: [journal_categories]
              mode: select
              create: false
          -
            handle: journal_tags
            field:
              type: terms
              display: Tags
              taxonomies: [journal_tags]
              mode: select
              create: true
  seo:
    display: SEO
    sections:
      -
        fields:
          -
            handle: seo_title
            field: { type: text, display: 'SEO title', localizable: true }
          -
            handle: seo_description
            field: { type: textarea, display: 'SEO description', localizable: true }
