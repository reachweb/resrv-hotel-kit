title: Room
tabs:
  main:
    display: Content
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              display: 'Room name'
              localizable: true
              validate: [required]
          -
            handle: slug
            field:
              type: slug
              display: Slug
              localizable: true
              generate: true
              validate: [required]
          -
            handle: intro
            field:
              type: markdown
              display: Introduction
              localizable: true
  media:
    display: Media
    sections:
      -
        fields:
          -
            handle: hero_image
            field:
              type: assets
              display: 'Hero image'
              container: assets
              folder: rooms
              max_files: 1
              mode: grid
              instructions: 'Recommended ratio 3:2. Degrades gracefully if empty.'
          -
            handle: gallery
            field:
              type: assets
              display: Gallery
              container: assets
              folder: rooms
              mode: grid
              instructions: 'Recommended ratio 3:2.'
  details:
    display: Details
    sections:
      -
        fields:
          -
            handle: size_sqm
            field: { type: integer, display: 'Size (m²)', width: 33 }
          -
            handle: max_occupancy
            field: { type: integer, display: 'Max occupancy', width: 33 }
          -
            handle: floor
            field: { type: text, display: Floor, width: 33 }
          -
            handle: bed_configuration
            field: { type: text, display: 'Bed configuration', width: 50 }
          -
            handle: view_type
            field: { type: text, display: View, width: 50 }
          -
            handle: amenities
            field:
              type: terms
              display: Amenities
              taxonomies: [amenities]
              mode: select
              create: false
          -
            handle: room_features
            field:
              type: terms
              display: 'Room features'
              taxonomies: [room_features]
              mode: select
              create: false
  booking:
    display: Booking
    sections:
      -
        display: Resrv
        instructions: 'Availability & pricing for this room. Rates, extras, dynamic pricing & affiliates are managed in Resrv → CP (not here).'
        fields:
          -
            handle: availability
            field: { type: resrv_availability, display: Availability }
          -
            handle: options
            field: { type: resrv_options, display: Options }
          -
            handle: extras
            field: { type: resrv_extras, display: Extras }
          -
            handle: cutoff
            field: { type: resrv_cutoff, display: Cutoff }
  seo:
    display: SEO
    sections:
      -
        fields:
          - import: seo
